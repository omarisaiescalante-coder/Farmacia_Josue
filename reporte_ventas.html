<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reporte de ventas</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>
<body data-report="ventas" class="bg-light">
    <nav class="navbar navbar-dark bg-success px-4 py-3 shadow d-print-none">
        <strong class="navbar-brand">Farmacia Josue</strong>
        <span id="sessionUser" class="text-white"></span>
        <button id="logoutButton" class="btn btn-outline-light">Cerrar sesión</button>
    </nav>
    <main class="container-fluid p-4">
        <div class="d-flex flex-wrap gap-2 mb-3 d-print-none">
            <button id="backButton" class="btn btn-outline-success">
                ← Volver atrás
            </button>
            <button id="generatePdfButton" class="btn btn-danger">
                Generar PDF
            </button>
        </div>
        <h1>Reporte de ventas</h1>
        <p class="text-secondary">
            Resumen de ingresos, egresos, ventas e inventario.
        </p>
        <div id="message" class="alert d-none"></div>

        <section class="card border-0 shadow-sm p-4 mb-4 d-print-none">
            <div class="row g-3 align-items-end">
                <div class="col-12 col-md-4">
                    <label for="salesStartDate" class="form-label fw-semibold">
                        Fecha de inicio
                    </label>
                    <input
                        id="salesStartDate"
                        class="form-control"
                        type="date"
                    >
                </div>
                <div class="col-12 col-md-4">
                    <label for="salesEndDate" class="form-label fw-semibold">
                        Fecha final
                    </label>
                    <input
                        id="salesEndDate"
                        class="form-control"
                        type="date"
                    >
                </div>
                <div class="col-12 col-md-4">
                    <button
                        id="generateSalesButton"
                        class="btn btn-success w-100"
                        type="button"
                    >
                        Generar reporte
                    </button>
                </div>
            </div>

        </section>

        <section class="card border-0 shadow-sm p-4 mb-4">
            <h2 class="h5 mb-3">Periodo del reporte</h2>
            <div class="row g-3">
                <div class="col-12 col-md-6">
                    <span class="text-secondary">Fecha de inicio:</span>
                    <strong id="periodStart" class="ms-2"></strong>
                </div>
                <div class="col-12 col-md-6">
                    <span class="text-secondary">Fecha final:</span>
                    <strong id="periodEnd" class="ms-2"></strong>
                </div>
            </div>
        </section>

        <section class="row g-3 mb-4 justify-content-center">
            <div class="col-12 col-md-6 col-xl-4">
                <div class="card border-0 shadow-sm p-4">
                    <span>Ingresos</span>
                    <strong id="totalIngresos" class="fs-3 text-success"></strong>
                </div>
            </div>
            <div class="col-12 col-md-6 col-xl-4">
                <div class="card border-0 shadow-sm p-4">
                    <span>Egresos</span>
                    <strong id="totalEgresos" class="fs-3 text-danger"></strong>
                </div>
            </div>
        </section>
        <section class="card border-0 shadow-sm table-responsive">
            <h2 class="h5 p-3 border-bottom mb-0">Ventas del periodo</h2>
            <div id="reportTable"></div>
        </section>
    </main>
    <script src="./reportes.js"></script>
</body>
</html>
