<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Detalle de recetas</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body data-module="detalle_recetas" class="bg-light">

    <!-- Barra superior -->
    <nav class="navbar navbar-dark bg-success px-4 py-3 shadow">
        <strong class="navbar-brand">
            Farmacia Josue
        </strong>

        <span
            id="sessionUser"
            class="text-white"
        ></span>

        <button
            id="logoutButton"
            class="btn btn-outline-light"
            type="button"
        >
            Cerrar sesión
        </button>
    </nav>

    <!-- Contenido principal -->
    <main class="container-fluid p-4">

        <button
            id="backButton"
            class="btn btn-outline-success mb-3"
            type="button"
        >
            ← Volver al menú
        </button>

        <h1 id="pageTitle"></h1>

        <p
            id="pageDescription"
            class="text-secondary"
        ></p>

        <!-- Mensajes del sistema -->
        <div
            id="message"
            class="alert d-none"
            role="alert"
        ></div>

        <!-- Formulario -->
        <section class="card border-0 rounded-4 shadow-sm p-4 mb-4">
            <form
                id="recordForm"
                class="row g-3"
            ></form>

            <div class="mt-3">
                <button
                    id="saveButton"
                    form="recordForm"
                    class="btn btn-success"
                    type="submit"
                >
                    Guardar
                </button>

                <button
                    id="clearButton"
                    class="btn btn-secondary"
                    type="button"
                >
                    Limpiar
                </button>
            </div>
        </section>

        <!-- Tabla de registros -->
        <section class="card border-0 rounded-4 shadow-sm table-responsive">
            <div id="tableContainer"></div>
        </section>

    </main>

    <script src="./tabla.js"></script>
</body>
</html>
