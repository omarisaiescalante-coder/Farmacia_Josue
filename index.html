<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia - Modulo Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <section id="loginScreen" class="min-vh-100 d-flex align-items-center justify-content-center bg-primary bg-gradient">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                    <div class="card shadow">
                        <div class="card-body p-4">
                            <div class="d-flex align-items-center gap-3 mb-4">
                                <div class="bg-success text-white rounded-2 d-flex align-items-center justify-content-center fs-2 fw-bold px-3 py-2">
                                    +
                                </div>
                                <div>
                                    <h1 class="h4 mb-0">Farmacia Josue</h1>
                                    <p class="text-secondary mb-0">Sistema de Control</p>
                                </div>
                            </div>

                            <div id="loginMessage" class="alert d-none" role="alert"></div>

                            <form id="loginForm">
                                <div class="mb-3">
                                    <label for="loginUser" class="form-label fw-semibold">Usuario</label>
                                    <input id="loginUser" class="form-control" type="text" autocomplete="username" required>
                                </div>

                                <div class="mb-3">
                                    <label for="loginPassword" class="form-label fw-semibold">Contrasena</label>
                                    <input id="loginPassword" class="form-control" type="password" autocomplete="current-password" required>
                                </div>

                                <button class="btn btn-success w-100 fw-semibold" type="submit">Ingresar</button>
                            </form>

                            <p class="small text-secondary mt-3 mb-0">
                                Usa un usuario activo registrado en la tabla usuarios.
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <main id="app" class="d-none">
        <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
            <div class="container-fluid">
                <span class="navbar-brand fw-bold">Modulo Principal</span>
                <div class="d-flex align-items-center">
                    <span id="sessionUser" class="text-secondary small">Usuario</span>
                </div>
            </div>
        </nav>

        <div class="container-fluid">
            <div class="row min-vh-100">
                <aside class="col-12 col-lg-2 bg-dark p-3 d-flex flex-column">
                    <div>
                        <p class="text-info small text-uppercase fw-bold mb-2">Menu</p>
                        <div class="nav nav-pills flex-column gap-2">
                            <button class="nav-link text-start active" data-module="clientes" type="button">Clientes</button>
                            <button class="nav-link text-start text-white" data-module="usuarios" type="button">Usuarios</button>
                            <button class="nav-link text-start text-white" data-module="medicamentos" type="button">Medicamentos</button>
                            <button class="nav-link text-start text-white" data-module="recetas" type="button">Recetas</button>
                            <button class="nav-link text-start text-white" data-module="lote" type="button">Lotes</button>
                            <button class="nav-link text-start text-white" data-module="ventas" type="button">Ventas</button>   
                        </div>
                    </div>

                    <div class="mt-auto pt-3">
                        <button id="logoutBtn" class="btn btn-danger w-100" type="button">Cerrar sesion</button>
                    </div>
                </aside>

                <section class="col-12 col-lg-10 p-4">
                    <div id="appMessage" class="alert d-none" role="alert"></div>

                    <div class="mb-3">
                        <h2 id="moduleTitle" class="h3 mb-1">Clientes</h2>
                        <p id="moduleDescription" class="text-secondary mb-0">Administracion de registros de clientes.</p>
                    </div>

                    <div class="d-flex flex-wrap gap-2 mb-3">
                        <button id="saveBtn" class="btn btn-primary" type="button">Guardar</button>
                        <button id="clearBtn" class="btn btn-warning text-white" type="button">Limpiar</button>
                        </div>

                    <div class="card shadow-sm mb-3">
                        <div class="card-body">
                            <form id="crudForm" class="row g-3"></form>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-body">
                            <div id="tableContainer" class="table-responsive"></div>
                        </div>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./renderer.js?=5"></script>
</body>
</html>
