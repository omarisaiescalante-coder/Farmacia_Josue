<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Farmacia Josue</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

    <!-- =====================================================
                PANTALLA DE INICIO DE SESIÓN
    ====================================================== -->

    <section
        id="loginScreen"
        class="min-vh-100 d-flex align-items-center justify-content-center bg-primary bg-gradient"
    >
        <div class="container">
            <div class="row justify-content-center">

                <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">

                    <div class="card shadow">

                        <div class="card-body p-4">

                            <!-- Encabezado del login -->

                            <div class="d-flex align-items-center gap-3 mb-4">

                                <div
                                    class="bg-success text-white rounded-2 d-flex align-items-center justify-content-center fs-2 fw-bold px-3 py-2"
                                >
                                    +
                                </div>

                                <div>
                                    <h1 class="h4 mb-0">
                                        Farmacia Josue
                                    </h1>

                                    <p class="text-secondary mb-0">
                                        Sistema de Control
                                    </p>
                                </div>

                            </div>

                            <!-- Mensaje del login -->

                            <div
                                id="loginMessage"
                                class="alert d-none"
                                role="alert"
                            ></div>

                            <!-- Formulario del login -->

                            <form id="loginForm">

                                <!-- Usuario -->

                                <div class="mb-3">

                                    <label
                                        for="loginUser"
                                        class="form-label fw-semibold"
                                    >
                                        Usuario
                                    </label>

                                    <input
                                        id="loginUser"
                                        name="loginUser"
                                        class="form-control"
                                        type="text"
                                        autocomplete="username"
                                        required
                                    >

                                    <div class="form-check mt-2">

                                        <input
                                            id="rememberUser"
                                            class="form-check-input"
                                            type="checkbox"
                                        >

                                        <label
                                            class="form-check-label"
                                            for="rememberUser"
                                        >
                                            Recordar usuario
                                        </label>

                                    </div>

                                </div>

                                <!-- Contraseña -->

                                <div class="mb-3">

                                    <label
                                        for="loginPassword"
                                        class="form-label fw-semibold"
                                    >
                                        Contraseña
                                    </label>

                                    <input
                                        id="loginPassword"
                                        name="loginPassword"
                                        class="form-control"
                                        type="password"
                                        autocomplete="current-password"
                                        required
                                    >

                                    <div class="form-check mt-2">

                                        <input
                                            id="showLoginPassword"
                                            class="form-check-input"
                                            type="checkbox"
                                        >

                                        <label
                                            class="form-check-label"
                                            for="showLoginPassword"
                                        >
                                            Mostrar contraseña
                                        </label>

                                    </div>

                                </div>

                                <!-- Botón ingresar -->

                                <button
                                    class="btn btn-success w-100 fw-semibold"
                                    type="submit"
                                >
                                    Ingresar
                                </button>

                            </form>

                            <p class="small text-secondary mt-3 mb-0">
                                Usa un usuario activo.
                            </p>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    </section>


    <!-- =====================================================
                    APLICACIÓN PRINCIPAL
    ====================================================== -->

    <main id="app" class="d-none">

        <!-- Barra superior -->

        <nav class="navbar bg-white border-bottom shadow-sm">

            <div class="container-fluid px-4">

                <span class="navbar-brand fw-bold">
                    Farmacia Josue
                </span>

                <div class="d-flex align-items-center gap-3">

                    <span
                        id="sessionUser"
                        class="text-secondary small"
                    >
                        Usuario
                    </span>

                    <button
                        id="logoutBtn"
                        class="btn btn-danger btn-sm"
                        type="button"
                    >
                        Cerrar sesión
                    </button>

                </div>

            </div>

        </nav>


        <!-- =================================================
                        MENÚ PRINCIPAL
        ================================================== -->

        <section
            id="menuOptions"
            class="min-vh-100 d-flex flex-column align-items-center justify-content-center text-center px-3 py-5"
        >

            <div class="container">

                <div class="mb-4">

                    <h2 class="h2 fw-bold mb-2">
                        Opciones del menú
                    </h2>

                    <p class="text-secondary mb-0">
                        Selecciona un módulo para administrar los registros.
                    </p>

                </div>

                <!-- Los botones se crean desde renderer.js -->

                <div
                    id="menuOptionsGrid"
                    class="row g-3 justify-content-center mx-auto"
                ></div>

            </div>

        </section>


        <!-- =================================================
                    SECCIÓN DE LOS MÓDULOS
        ================================================== -->

        <section
            id="crudSection"
            class="container-fluid px-3 px-lg-5 py-4 d-none"
        >

            <!-- Mensajes -->

            <div
                id="appMessage"
                class="alert d-none"
                role="alert"
            ></div>


            <!-- Encabezado del módulo -->

            <div
                class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4"
            >

                <div>

                    <h2
                        id="moduleTitle"
                        class="h3 fw-bold mb-1"
                    >
                        Clientes
                    </h2>

                    <p
                        id="moduleDescription"
                        class="text-secondary mb-0"
                    >
                        Administración de registros.
                    </p>

                </div>

                <!-- Botón para volver al menú -->

                <button
                    id="backMenuBtn"
                    class="btn btn-outline-secondary"
                    type="button"
                >
                    ← Volver atrás
                </button>

            </div>


            <!-- Botones Guardar y Limpiar -->

            <div class="d-flex flex-wrap gap-2 mb-3">

                <button
                    id="saveBtn"
                    class="btn btn-primary"
                    type="button"
                >
                    Guardar
                </button>

                <button
                    id="clearBtn"
                    class="btn btn-warning"
                    type="button"
                >
                    Limpiar
                </button>

            </div>


            <!-- Formulario dinámico -->

            <div class="card shadow-sm mb-4">

                <div class="card-header bg-white">

                    <h3 class="h5 mb-0">
                        Datos del registro
                    </h3>

                </div>

                <div class="card-body">

                    <form
                        id="crudForm"
                        class="row g-3"
                    ></form>

                </div>

            </div>


            <!-- Tabla de registros -->

            <div class="card shadow-sm">

                <div class="card-header bg-white">

                    <h3 class="h5 mb-0">
                        Registros
                    </h3>

                </div>

                <div class="card-body">

                    <div
                        id="tableContainer"
                        class="table-responsive"
                    ></div>

                </div>

            </div>

        </section>

    </main>


    <!-- Bootstrap -->

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>

    <!-- Renderer -->

    <script src="./renderer.js?v=11"></script>

</body>
</html>
